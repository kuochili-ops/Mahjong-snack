<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>麻將貪吃蛇 - 絲滑直角版</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --board-color: #163e32;
            --gold: #ffb703;
        }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            background-color: var(--bg-color);
            color: #f8f9fa; font-family: "微軟正黑體", sans-serif;
            touch-action: none; overflow: hidden;
        }

        #dashboard {
            width: 360px; display: flex; justify-content: space-between;
            padding: 10px 0; font-size: 14px; font-weight: bold; color: var(--gold);
        }

        canvas {
            background-color: var(--board-color);
            border: 6px solid #4e342e;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #ui-panel {
            width: 360px; margin-top: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px; padding: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-label { font-size: 12px; color: #81b29a; margin-bottom: 5px; text-align: center; }

        #reserved-area {
            display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; min-height: 40px;
        }

        .set-box {
            display: flex; background: #f1faee; padding: 2px;
            border-radius: 4px; border: 1px solid var(--gold);
        }

        .tile {
            width: 22px; height: 30px; 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 18px; 
            margin: 0 1px; border-radius: 2px; background: #fff;
            box-shadow: 1px 1px 0 #ccc;
            line-height: 1; padding-bottom: 4px; color: #1d3557;
        }

        #controls { margin-top: 15px; display: flex; gap: 50px; }

        .btn {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            color: white; font-size: 24px; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; user-select: none;
        }

        #l-btn { background: #457b9d; box-shadow: 0 5px 0 #1d3557; }
        #r-btn { background: #e63946; box-shadow: 0 5px 0 #a8dadc; }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        #modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 30px; border-radius: 15px;
            text-align: center; display: none; border: 2px solid var(--gold); z-index: 100;
            width: 280px;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div>剩餘黑字: <span id="b-num">0</span></div>
        <div>蛇身長: <span id="s-len">0</span></div>
    </div>

    <canvas id="gameCanvas" width="360" height="360"></canvas>

    <div id="ui-panel">
        <div class="section-label">保留區 (已完成牌組)</div>
        <div id="reserved-area"></div>
    </div>

    <div id="controls">
        <div id="l-btn" class="btn">↺<span style="font-size:10px">左轉</span></div>
        <div id="r-btn" class="btn">↻<span style="font-size:10px">右轉</span></div>
    </div>

    <div id="modal">
        <h2 id="m-title">遊戲結束</h2>
        <div id="tai-list" style="text-align:left; font-size:14px; margin:10px 0;"></div>
        <div id="tai-sum" style="color:var(--gold); font-size:18px; margin-bottom:10px;"></div>
        <button onclick="location.reload()" style="padding: 10px 25px; cursor: pointer; background: var(--gold); border:none; border-radius:5px;">再玩一局</button>
    </div>

<script>
const MJ = (() => {
    const chars = ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏','🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡','🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘','🀀','🀁','🀂','🀃','🀄','🀅','🀆'];
    const getT = (i) => ({ id: i, char: chars[i], suit: i < 27 ? Math.floor(i/9) : 3, val: i < 27 ? (i%9)+1 : (i-26) });
    return {
        random: () => getT(Math.floor(Math.random()*chars.length)),
        isSet: (a, b, c) => {
            if (a.id === b.id && b.id === c.id) return true;
            if (a.suit === b.suit && b.suit < 3) {
                const v = [a.val, b.val, c.val].sort((x,y)=>x-y);
                return (v[1] === v[0]+1 && v[2] === v[1]+1);
            }
            return false;
        }
    };
})();

const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
const TILE_SIZE = 28;
const GAP_POINTS = 14; // 每節牌之間的路徑點數量，控制緊湊度
let snake = {
    x: 180, y: 180,
    dirIndex: 0, // 0:右, 1:下, 2:左, 3:上
    dirs: [{x:1,y:0},{x:0,y:1},{x:-1,y:0},{x:0,y:-1}],
    body: [], // 牌對象
    history: [] // 關鍵點路徑記錄
};
let reserved = [], food = null, active = true, speed = 2.5;

function start() {
    // 初始化蛇身
    for(let i=0; i<6; i++) snake.body.push({ t: MJ.random(), isRed: false });
    // 初始化路徑緩衝，防止開始就分離
    for(let i=0; i<500; i++) snake.history.push({x: 180 - i*speed, y: 180});
    
    genFood();
    updateUI();
    gameLoop();
}

function genFood() {
    food = { x: 30 + Math.random()*300, y: 30 + Math.random()*300, t: MJ.random() };
}

function gameLoop() {
    if(!active) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function update() {
    // 移動蛇頭
    const d = snake.dirs[snake.dirIndex];
    snake.x += d.x * speed;
    snake.y += d.y * speed;

    // 記錄位置
    snake.history.unshift({x: snake.x, y: snake.y});
    if(snake.history.length > 1000) snake.history.pop();

    // 邊界檢查
    if(snake.x < 0 || snake.x > 360 || snake.y < 0 || snake.y > 360) return die("撞牆放槍！");

    // 自撞檢查 (從第2節牌開始算)
    for (let i = 2; i < snake.body.length; i++) {
        const p = snake.history[i * GAP_POINTS];
        if (p && Math.sqrt((snake.x-p.x)**2 + (snake.y-p.y)**2) < 15) return die("自殺放槍！");
    }

    // 吃到食物
    if (Math.sqrt((snake.x-food.x)**2 + (snake.y-food.y)**2) < 22) {
        handleEat(food.t);
        genFood();
    }
}

function handleEat(newT) {
    const blacks = snake.body.filter(b => !b.isRed);
    const reds = snake.body.filter(b => b.isRed);
    let matchedSet = null;
    let partsToRemove = [];

    // 檢查是否有湊成一組
    for(let i=0; i<blacks.length && !matchedSet; i++) {
        for(let j=i+1; j<blacks.length && !matchedSet; j++) {
            if(MJ.isSet(newT, blacks[i].t, blacks[j].t)) {
                matchedSet = [newT, blacks[i].t, blacks[j].t];
                partsToRemove = [blacks[i], blacks[j]];
            }
        }
    }
    if(!matchedSet) {
        for(let i=0; i<reds.length && !matchedSet; i++) {
            for(let j=i+1; j<reds.length && !matchedSet; j++) {
                if(MJ.isSet(newT, reds[i].t, reds[j].t)) {
                    matchedSet = [newT, reds[i].t, reds[j].t];
                    partsToRemove = [reds[i], reds[j]];
                }
            }
        }
    }

    if(matchedSet) {
        reserved.push(matchedSet);
        snake.body = snake.body.filter(b => !partsToRemove.includes(b));
    } else {
        snake.body.unshift({ t: newT, isRed: true });
    }
    updateUI();
    if(snake.body.filter(b => !b.isRed).length === 0) calculateWin();
}

function draw() {
    ctx.clearRect(0,0,360,360);
    
    // 背景網格
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    for(let i=0; i<=360; i+=30) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,360); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(360,i); ctx.stroke();
    }

    // 畫食物
    drawTile(food.x, food.y, food.t.char, true, false);

    // 畫蛇身 (倒序畫，頭在最上面)
    for (let i = snake.body.length - 1; i >= 0; i--) {
        const p = snake.history[i * GAP_POINTS];
        if(p) drawTile(p.x, p.y, snake.body[i].t.char, snake.body[i].isRed, i === 0);
    }
}

function drawTile(x, y, char, isRed, isHead) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = isHead ? "#ffb703" : "#fff";
    ctx.beginPath();
    ctx.roundRect(-TILE_SIZE/2, -TILE_SIZE/2, TILE_SIZE, TILE_SIZE, 4);
    ctx.fill();
    ctx.fillStyle = isRed ? "#e63946" : "#1d3557";
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(char, 0, -3); // 維持您要求的上移置中
    ctx.restore();
}

function updateUI() {
    document.getElementById('b-num').innerText = snake.body.filter(b => !b.isRed).length;
    document.getElementById('s-len').innerText = snake.body.length;
    const area = document.getElementById('reserved-area');
    area.innerHTML = '';
    reserved.forEach(s => {
        const d = document.createElement('div'); d.className='set-box';
        s.forEach(t => {
            const i = document.createElement('div'); i.className='tile'; i.innerText=t.char; d.appendChild(i);
        });
        area.appendChild(d);
    });
}

function die(msg) { active = false; document.getElementById('m-title').innerText = msg; document.getElementById('modal').style.display = 'block'; }

function calculateWin() {
    active = false;
    document.getElementById('m-title').innerText = "🎉 胡牌！";
    document.getElementById('modal').style.display = 'block';
    // 台數計算邏輯同前...
}

// 直角控制邏輯
document.getElementById('l-btn').onclick = () => {
    snake.dirIndex = (snake.dirIndex + 3) % 4; // 逆時針 90 度
};
document.getElementById('r-btn').onclick = () => {
    snake.dirIndex = (snake.dirIndex + 1) % 4; // 順時針 90 度
};

// 鍵盤支援
window.onkeydown = (e) => {
    if(e.key === 'ArrowLeft') snake.dirIndex = (snake.dirIndex + 3) % 4;
    if(e.key === 'ArrowRight') snake.dirIndex = (snake.dirIndex + 1) % 4;
};

start();
</script>
</body>
</html>
