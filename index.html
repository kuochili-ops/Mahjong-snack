<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>чЩ╜хЕнщ║╗х░Зш▓кщгЯшЫЗ - хЫЫцЪЧхИ╗цМСцИ░ш│╜</title>
    <style>
        :root { --bg: #0d1117; --board: #163e32; --gold: #ffb703; --red: #e63946; --blue: #457b9d; }
        body { margin: 0; background: var(--bg); color: #f8f9fa; font-family: "х╛ош╗Яцнгщ╗СщлФ", sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: none; overflow: hidden; }
        
        /* хДАшбицЭ┐ */
        #dashboard { width: 360px; display: flex; justify-content: space-between; padding: 10px 0; font-size: 14px; font-weight: bold; color: var(--gold); }
        
        /* чХлх╕Г */
        canvas { background: var(--board); border: 6px solid #4e342e; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* ф┐ЭчХЩхНА UI */
        #ui-panel { width: 360px; margin-top: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .section-label { font-size: 12px; color: #81b29a; text-align: center; margin-bottom: 5px; }
        #reserved-area { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; min-height: 45px; }
        
        /* чЙМч╡Дцигх╝П */
        .set-box { display: flex; background: #f1faee; padding: 2px; border-radius: 4px; border: 1.5px solid var(--gold); position: relative; margin-bottom: 12px; }
        .set-type-tag { position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #fff; background: #333; padding: 0 4px; border-radius: 3px; border: 1px solid var(--gold); white-space: nowrap; z-index: 5; }
        .tile { width: 22px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 22px; margin: 0 1px; border-radius: 2px; background: #fff; box-shadow: 1px 1px 0 #ccc; color: #1d3557; padding-bottom: 5px; line-height: 1; }
        
        /* чРЖчЙМщБоч╜й */
        #sorting-overlay { position: fixed; inset: 0; background: rgba(13, 17, 23, 0.98); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #hand-area { display: flex; flex-wrap: wrap; width: 340px; gap: 5px; justify-content: center; margin-bottom: 25px; }
        .hand-tile { width: 38px; height: 52px; background: #fff; color: #1d3557; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 36px; cursor: pointer; border: 2px solid #ccc; padding-bottom: 6px; user-select: none; transition: 0.2s; }
        .hand-tile.selected { border: 3px solid var(--gold); transform: translateY(-10px); box-shadow: 0 8px 15px rgba(255,183,3,0.4); }
        
        /* цМЙщИХч╡Д */
        .btn-group { display: flex; gap: 15px; }
        .ctrl-btn { padding: 12px 25px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        #form-set-btn { background: var(--blue); color: white; }
        #start-game-btn { background: var(--gold); color: #000; }
        
        /* щБКцИ▓цУНцОз */
        #controls { margin-top: 20px; display: flex; gap: 60px; }
        .btn { width: 85px; height: 85px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.2); color: white; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; user-select: none; transition: active 0.1s; }
        #l-btn { background: var(--blue); box-shadow: 0 6px 0 #1d3557; }
        #r-btn { background: var(--red); box-shadow: 0 6px 0 #941b24; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        /* х╜ИчкЧ */
        #modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 30px; border-radius: 15px; text-align: center; display: none; border: 2px solid var(--gold); z-index: 2000; width: 300px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #status-tip { color: var(--gold); font-size: 14px; margin-top: 10px; height: 20px; }
    </style>
</head>
<body>

<div id="sorting-overlay">
    <h2 style="color:var(--gold); margin:0 0 10px 0;">ЁЯАД щЦЛх▒АчРЖчЙМ (17х╝╡)</h2>
    <div class="section-label" style="margin-bottom:20px;">
        чЫоциЩя╝Ъц╣Кщ╜К 5 ч╡ДщаЖхнР/хИ╗хнРуАВцМСцИ░<b>уАМхЫЫцЪЧхИ╗уАН</b>(4ч╡ДхИ╗хнР) чНОхЛ╡ 8 хП░я╝Б
    </div>
    <div id="hand-area"></div>
    <div id="status-tip"></div>
    <div class="btn-group" style="margin-top:20px;">
        <button id="form-set-btn" class="ctrl-btn">ч╡ДцИРчЙМч╡Д</button>
        <button id="start-game-btn" class="ctrl-btn">щА▓хЕещБКцИ▓</button>
    </div>
</div>

<div id="dashboard">
    <div>щА▓х║ж: <span id="r-count">0</span> / 5</div>
    <div>хИ╗хнРцХ╕: <span id="k-count">0</span></div>
    <div>хЙйщдШщ╗СчЙМ: <span id="b-num">0</span></div>
</div>

<canvas id="gameCanvas" width="360" height="360"></canvas>

<div id="ui-panel">
    <div class="section-label">ф┐ЭчХЩхНА (х╖▓щОЦхоЪчЙМч╡Д)</div>
    <div id="reserved-area"></div>
</div>

<div id="controls">
    <div id="l-btn" class="btn">тЖ║<span style="font-size:12px">х╖жш╜Й</span></div>
    <div id="r-btn" class="btn">тЖ╗<span style="font-size:12px">хП│ш╜Й</span></div>
</div>

<div id="modal">
    <h2 id="m-title" style="color:var(--gold); margin-top:0;">шГбчЙМя╝Б</h2>
    <div id="tai-list" style="text-align:left; font-size:15px; margin:15px 0; color:#ddd; line-height:1.6;"></div>
    <div id="tai-sum" style="color:var(--gold); font-size:26px; font-weight:bold; border-top:1px solid #444; padding-top:10px;"></div>
    <button onclick="location.reload()" style="margin-top:20px; padding: 12px 30px; background:var(--gold); border:none; border-radius:6px; font-weight:bold; cursor:pointer;">хЖНцМСцИ░ф╕Ах▒А</button>
</div>

<script>
const MJ = (() => {
    const chars = ['ЁЯАЗ','ЁЯАИ','ЁЯАЙ','ЁЯАК','ЁЯАЛ','ЁЯАМ','ЁЯАН','ЁЯАО','ЁЯАП','ЁЯАЩ','ЁЯАЪ','ЁЯАЫ','ЁЯАЬ','ЁЯАЭ','ЁЯАЮ','ЁЯАЯ','ЁЯАа','ЁЯАб','ЁЯАР','ЁЯАС','ЁЯАТ','ЁЯАУ','ЁЯАФ','ЁЯАХ','ЁЯАЦ','ЁЯАЧ','ЁЯАШ','ЁЯАА','ЁЯАБ','ЁЯАВ','ЁЯАГ','ЁЯАД','ЁЯАЕ','ЁЯАЖ'];
    const getT = (i) => ({ id: i, char: chars[i], suit: i < 27 ? Math.floor(i/9) : 3, val: i < 27 ? (i%9)+1 : (i-26) });
    return {
        random: () => getT(Math.floor(Math.random()*chars.length)),
        isSet: (a, b, c) => {
            const arr = [a, b, c].sort((x, y) => x.id - y.id);
            if (arr[0].id === arr[1].id && arr[1].id === arr[2].id) return "хИ╗хнР";
            if (arr[0].suit === arr[1].suit && arr[1].suit === arr[2].suit && arr[0].suit < 3) {
                if (arr[1].val === arr[0].val + 1 && arr[2].val === arr[1].val + 1) return "щаЖхнР";
            }
            return null;
        },
        isPair: (a, b) => a.id === b.id,
        sort: (list) => list.sort((a, b) => a.id - b.id)
    };
})();

const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
let snake = { x: 50, y: 180, dirIndex: 0, dirs: [{x:1,y:0},{x:0,y:1},{x:-1,y:0},{x:0,y:-1}], body: [], history: [] };
let reserved = [], food = null, active = false, speed = 2.4, initialHand = [];
let selectedItems = [];

// хИЭхзЛхМЦчРЖчЙМ
function initSorting() {
    for(let i=0; i<17; i++) initialHand.push(MJ.random());
    renderHand();
}

function renderHand() {
    MJ.sort(initialHand);
    const handArea = document.getElementById('hand-area');
    const tip = document.getElementById('status-tip');
    handArea.innerHTML = '';
    selectedItems = [];
    
    initialHand.forEach((t, idx) => {
        const div = document.createElement('div');
        div.className = 'hand-tile';
        div.innerText = t.char;
        div.onclick = () => {
            if(div.classList.contains('selected')) {
                div.classList.remove('selected');
                selectedItems = selectedItems.filter(item => item.idx !== idx);
            } else if(selectedItems.length < 3) {
                div.classList.add('selected');
                selectedItems.push({t, idx, div});
            }
            // хН│цЩВхБ╡ц╕м
            if(selectedItems.length === 3) {
                const type = MJ.isSet(selectedItems[0].t, selectedItems[1].t, selectedItems[2].t);
                tip.innerText = type ? `хБ╡ц╕мхИ░я╝Ъ${type}я╝Б` : "ф╕НчмжхРИч╡ДхРИшжПхЙЗ";
                tip.style.color = type ? "var(--gold)" : "var(--red)";
            } else { tip.innerText = ""; }
        };
        handArea.appendChild(div);
    });
}

document.getElementById('form-set-btn').onclick = () => {
    if(selectedItems.length !== 3) return;
    const type = MJ.isSet(selectedItems[0].t, selectedItems[1].t, selectedItems[2].t);
    if(type) {
        if(reserved.length >= 5) return alert("ф┐ЭчХЩхНАх╖▓ц╗┐я╝МшлЛщЦЛхзЛщБКцИ▓ц╣КцЬАх╛МчЪДф╕Ах░Нх░ЗчЙМя╝Б");
        reserved.push({tiles: selectedItems.map(s => s.t), type: type});
        const indices = selectedItems.map(s => s.idx).sort((a,b)=>b-a);
        indices.forEach(i => initialHand.splice(i, 1));
        renderHand();
        updateUI();
    }
};

document.getElementById('start-game-btn').onclick = () => {
    document.getElementById('sorting-overlay').style.display = 'none';
    snake.body = initialHand.map(t => ({t, isRed: false}));
    for(let i=0; i<500; i++) snake.history.push({x: 50 - i*speed, y: 180});
    active = true;
    genFood();
    updateUI();
    gameLoop();
};

function genFood() { food = { x: 30 + Math.random()*300, y: 30 + Math.random()*300, t: MJ.random() }; }

function gameLoop() { if(!active) return; update(); draw(); requestAnimationFrame(gameLoop); }

function update() {
    const d = snake.dirs[snake.dirIndex];
    snake.x += d.x * speed; snake.y += d.y * speed;
    snake.history.unshift({x: snake.x, y: snake.y});
    
    // цТЮчЙЖцИЦхТмшЗкх╖▒
    if(snake.x < 0 || snake.x > 360 || snake.y < 0 || snake.y > 360) return die("цТЮчЙЖф║Жя╝Б");
    for (let i = 3; i < snake.body.length; i++) {
        const p = snake.history[i * 14];
        if (p && Math.sqrt((snake.x-p.x)**2 + (snake.y-p.y)**2) < 15) return die("хТмхИ░шЗкх╖▒ф║Жя╝Б");
    }
    
    // хРГхИ░чЙМ
    if (Math.sqrt((snake.x-food.x)**2 + (snake.y-food.y)**2) < 22) {
        handleEat(food.t);
        genFood();
    }
}

function handleEat(newT) {
    // 1. хДкхЕИхИдхоЪуАМцШОхИ╗хКацзУуАН
    for (let set of reserved) {
        if (set.type.includes("хИ╗хнР") && set.tiles[0].id === newT.id) {
            if(set.tiles.length < 4) {
                set.tiles.push(newT);
                set.type = "цШОхИ╗ (цзУ)";
                updateUI();
                return; // чЫ┤цОехР╕цФ╢я╝Мф╕НхвЮхКащХ╖х║ж
            }
        }
    }

    // 2. хИдхоЪц╣Кч╡Д
    let found = false;
    for (let i = 0; i < snake.body.length; i++) {
        for (let j = i + 1; j < snake.body.length; j++) {
            const p1 = snake.body[i], p2 = snake.body[j];
            const setType = MJ.isSet(newT, p1.t, p2.t);
            if (p1.isRed === p2.isRed && setType) {
                if (!p1.isRed && reserved.length < 5) {
                    reserved.push({tiles: [newT, p1.t, p2.t], type: setType});
                }
                // ч┤ЕчЙМч╡ДцИЦц║вхЗ║ч╡ДчЫ┤цОец╢Ихд▒
                snake.body.splice(j, 1); 
                snake.body.splice(i, 1);
                found = true; break;
            }
        }
        if (found) break;
    }
    
    if (!found) snake.body.unshift({ t: newT, isRed: true });
    updateUI();
    
    // 3. шГбчЙМцквцЯе
    const blacks = snake.body.filter(b => !b.isRed);
    if (reserved.length === 5 && blacks.length === 2 && MJ.isPair(blacks[0].t, blacks[1].t)) {
        calculateWin();
    }
}

function draw() {
    ctx.clearRect(0,0,360,360);
    // чХлшГМцЩпца╝ч╖Ъ
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    for(let i=0; i<360; i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,360); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(360,i); ctx.stroke(); }
    
    drawTile(food.x, food.y, food.t.char, true, false);
    for (let i = snake.body.length - 1; i >= 0; i--) {
        const p = snake.history[i * 14];
        if(p) drawTile(p.x, p.y, snake.body[i].t.char, snake.body[i].isRed, i === 0);
    }
}

function drawTile(x, y, char, isRed, isHead) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = isHead ? varColor("--gold") : "#fff";
    ctx.beginPath(); ctx.roundRect(-14, -14, 28, 28, 4); ctx.fill();
    ctx.fillStyle = isRed ? varColor("--red") : "#1d3557";
    ctx.font = "bold 24px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(char, 0, -3.5); ctx.restore();
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function updateUI() {
    document.getElementById('r-count').innerText = reserved.length;
    document.getElementById('b-num').innerText = snake.body.filter(b => !b.isRed).length;
    const kCount = reserved.filter(r => r.type.includes("хИ╗хнР") || r.type.includes("цШОхИ╗")).length;
    document.getElementById('k-count').innerText = kCount;
    
    const area = document.getElementById('reserved-area'); area.innerHTML = '';
    reserved.forEach(s => {
        const d = document.createElement('div'); d.className='set-box';
        s.tiles.forEach(t => { const i = document.createElement('div'); i.className='tile'; i.innerText=t.char; d.appendChild(i); });
        const tag = document.createElement('div'); tag.className='set-type-tag'; 
        tag.innerText = s.type;
        if(s.type.includes("цШОхИ╗")) tag.style.background = varColor("--gold"), tag.style.color = "#000";
        d.appendChild(tag);
        area.appendChild(d);
    });
}

function die(msg) { active = false; document.getElementById('m-title').innerText = msg; document.getElementById('modal').style.display = 'block'; }

function calculateWin() {
    active = false;
    let tai = 1, list = ["х║ХхП░ 1 хП░"];
    const kCount = reserved.filter(r => r.type.includes("хИ╗хнР") || r.type.includes("цШОхИ╗")).length;
    
    if (kCount >= 5) { list.push("ф║ФцЪЧхИ╗цИРх░▒ 13 хП░"); tai += 13; }
    else if (kCount === 4) { list.push("хЫЫцЪЧхИ╗цИРх░▒ 8 хП░"); tai += 8; }
    else if (reserved.every(s => s.type === "щаЖхнР")) { list.push("х╣│шГб 2 хП░"); tai += 2; }
    
    if (snake.body.length === 2) { list.push("хЕиц▒Вф║║ 2 хП░"); tai += 2; }
    
    document.getElementById('m-title').innerText = "ЁЯОЙ цБнхЦЬшГбчЙМя╝Б";
    document.getElementById('tai-list').innerHTML = list.map(l => `<div>тАв ${l}</div>`).join('');
    document.getElementById('tai-sum').innerText = `ч╕╜шиИя╝Ъ${tai} хП░`;
    document.getElementById('modal').style.display = 'block';
}

document.getElementById('l-btn').onclick = () => { snake.dirIndex = (snake.dirIndex + 3) % 4; };
document.getElementById('r-btn').onclick = () => { snake.dirIndex = (snake.dirIndex + 1) % 4; };

initSorting();
</script>
</body>
</html>
