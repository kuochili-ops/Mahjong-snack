<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>зЩљеЕ≠йЇїе∞Зи≤™й£ЯиЫЗ - еНБеЕ≠еЉµе∞Иж•≠зЙИ</title>
    <style>
        :root { --bg: #0d1117; --board: #163e32; --gold: #ffb703; }
        body { margin: 0; background: var(--bg); color: #f8f9fa; font-family: "еЊЃиїЯж≠£йїСйЂФ", sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: none; overflow: hidden; }
        #dashboard { width: 360px; display: flex; justify-content: space-between; padding: 10px 0; font-size: 14px; color: var(--gold); }
        canvas { background: var(--board); border: 6px solid #4e342e; border-radius: 8px; }
        #ui-panel { width: 360px; margin-top: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .section-label { font-size: 12px; color: #81b29a; text-align: center; margin-bottom: 5px; }
        #reserved-area { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; min-height: 40px; }
        .set-box { display: flex; background: #f1faee; padding: 2px; border-radius: 4px; border: 1px solid var(--gold); }
        .tile { width: 22px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 22px; margin: 0 1px; border-radius: 2px; background: #fff; box-shadow: 1px 1px 0 #ccc; color: #1d3557; padding-bottom: 5px; line-height: 1; }
        
        /* зРЖзЙМдїЛйЭҐ */
        #sorting-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #hand-area { display: flex; flex-wrap: wrap; width: 320px; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .hand-tile { width: 45px; height: 60px; background: #fff; color: #1d3557; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-size: 36px; cursor: pointer; border: 3px solid transparent; padding-bottom: 8px; }
        .hand-tile.selected { border-color: var(--gold); transform: translateY(-5px); }
        #confirm-btn { padding: 15px 40px; background: var(--gold); color: #000; border: none; border-radius: 5px; font-weight: bold; font-size: 18px; cursor: pointer; }

        #controls { margin-top: 15px; display: flex; gap: 50px; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); color: white; font-size: 24px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; user-select: none; }
        #l-btn { background: #457b9d; box-shadow: 0 5px 0 #1d3557; }
        #r-btn { background: #e63946; box-shadow: 0 5px 0 #a8dadc; }
        
        #modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 30px; border-radius: 15px; text-align: center; display: none; border: 2px solid var(--gold); z-index: 2000; width: 280px; }
    </style>
</head>
<body>

<div id="sorting-overlay">
    <h3 style="color:var(--gold)">йЦЛе±АйЕНзЙМпЉЪжМСйБЄжИРзµДзЙМ(й†Ж/еИї)</h3>
    <div id="hand-area"></div>
    <button id="confirm-btn">зҐЇеЃЪдЄ¶йЦЛеІЛйБКжИ≤</button>
    <p style="font-size:12px; margin-top:10px; color:#888;">еЙ©й§ШйїСзЙМе∞ЗжИРзВЇиЫЗиЇЂеЄґеЕ•йБКжИ≤еНА</p>
</div>

<div id="dashboard">
    <div>йїСзЙМ: <span id="b-num">0</span></div>
    <div>иЫЗйХЈ: <span id="s-len">0</span></div>
</div>

<canvas id="gameCanvas" width="360" height="360"></canvas>

<div id="ui-panel">
    <div class="section-label">дњЭзХЩеНА (еЈ≤зРЖзЙМзµД)</div>
    <div id="reserved-area"></div>
</div>

<div id="controls">
    <div id="l-btn" class="btn">вЖЇ<span style="font-size:10px">еЈ¶иљЙ</span></div>
    <div id="r-btn" class="btn">вЖї<span style="font-size:10px">еП≥иљЙ</span></div>
</div>

<div id="modal">
    <h2 id="m-title">иГ°зЙМпЉБ</h2>
    <div id="tai-list" style="text-align:left; font-size:14px; margin:10px 0; max-height: 150px; overflow-y: auto;"></div>
    <div id="tai-sum" style="color:var(--gold); font-size:22px; font-weight:bold;"></div>
    <button onclick="location.reload()" style="margin-top:15px; padding: 8px 20px;">йЗНзО©</button>
</div>

<script>
const MJ = (() => {
    const chars = ['рЯАЗ','рЯАИ','рЯАЙ','рЯАК','рЯАЛ','рЯАМ','рЯАН','рЯАО','рЯАП','рЯАЩ','рЯАЪ','рЯАЫ','рЯАЬ','рЯАЭ','рЯАЮ','рЯАЯ','рЯА†','рЯА°','рЯАР','рЯАС','рЯАТ','рЯАУ','рЯАФ','рЯАХ','рЯАЦ','рЯАЧ','рЯАШ','рЯАА','рЯАБ','рЯАВ','рЯАГ','рЯАД','рЯАЕ','рЯАЖ'];
    const getT = (i) => ({ id: i, char: chars[i], suit: i < 27 ? Math.floor(i/9) : 3, val: i < 27 ? (i%9)+1 : (i-26) });
    return {
        random: () => getT(Math.floor(Math.random()*chars.length)),
        isSet: (a, b, c) => {
            if (a.id === b.id && b.id === c.id) return "еИїе≠Р";
            if (a.suit === b.suit && b.suit < 3) {
                const v = [a.val, b.val, c.val].sort((x,y)=>x-y);
                if (v[1] === v[0]+1 && v[2] === v[1]+1) return "й†Же≠Р";
            }
            return null;
        },
        isPair: (a, b) => a.id === b.id
    };
})();

const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
const TILE_SIZE = 28;
const GAP_POINTS = 14;
let snake = { x: 50, y: 180, dirIndex: 0, dirs: [{x:1,y:0},{x:0,y:1},{x:-1,y:0},{x:0,y:-1}], body: [], history: [] };
let reserved = [], food = null, active = false, speed = 2.5, initialHand = [];
let selectedTiles = [];

// еИЭеІЛеМЦ 16 еЉµзЙМ
function initSorting() {
    const handArea = document.getElementById('hand-area');
    for(let i=0; i<16; i++) {
        const t = MJ.random();
        initialHand.push(t);
        const div = document.createElement('div');
        div.className = 'hand-tile';
        div.innerText = t.char;
        div.onclick = () => {
            if(div.classList.contains('selected')) {
                div.classList.remove('selected');
                selectedTiles = selectedTiles.filter(item => item.div !== div);
            } else if(selectedTiles.length < 3) {
                div.classList.add('selected');
                selectedTiles.push({t, div});
            }
        };
        handArea.appendChild(div);
    }
}

document.getElementById('confirm-btn').onclick = () => {
    if(selectedTiles.length === 3) {
        const type = MJ.isSet(selectedTiles[0].t, selectedTiles[1].t, selectedTiles[2].t);
        if(type) {
            reserved.push(selectedTiles.map(s => s.t));
            selectedTiles.forEach(s => {
                s.div.style.visibility = 'hidden';
                initialHand = initialHand.filter(t => t !== s.t);
            });
            selectedTiles = [];
            updateUI();
            return;
        }
    }
    // йЦЛеІЛйБКжИ≤
    document.getElementById('sorting-overlay').style.display = 'none';
    snake.body = initialHand.map(t => ({t, isRed: false}));
    for(let i=0; i<500; i++) snake.history.push({x: 50 - i*speed, y: 180});
    active = true;
    genFood();
    updateUI();
    gameLoop();
};

function genFood() { food = { x: 30 + Math.random()*300, y: 30 + Math.random()*300, t: MJ.random() }; }

function gameLoop() { if(!active) return; update(); draw(); requestAnimationFrame(gameLoop); }

function update() {
    const d = snake.dirs[snake.dirIndex];
    snake.x += d.x * speed; snake.y += d.y * speed;
    snake.history.unshift({x: snake.x, y: snake.y});
    if(snake.x < 0 || snake.x > 360 || snake.y < 0 || snake.y > 360) return die("жТЮзЙЖпЉБ");
    for (let i = 2; i < snake.body.length; i++) {
        const p = snake.history[i * GAP_POINTS];
        if (p && Math.sqrt((snake.x-p.x)**2 + (snake.y-p.y)**2) < 15) return die("иЗ™жЃЇпЉБ");
    }
    if (Math.sqrt((snake.x-food.x)**2 + (snake.y-food.y)**2) < 22) {
        handleEat(food.t);
        genFood();
    }
}

function handleEat(newT) {
    let found = false;
    for (let i = 0; i < snake.body.length; i++) {
        for (let j = i + 1; j < snake.body.length; j++) {
            const p1 = snake.body[i], p2 = snake.body[j];
            if (p1.isRed === p2.isRed && MJ.isSet(newT, p1.t, p2.t)) {
                if (!p1.isRed) reserved.push([newT, p1.t, p2.t]);
                snake.body.splice(j, 1); snake.body.splice(i, 1);
                found = true; break;
            }
        }
        if (found) break;
    }
    if (!found) snake.body.unshift({ t: newT, isRed: true });
    updateUI();
    const blacks = snake.body.filter(b => !b.isRed);
    if (blacks.length === 2 && MJ.isPair(blacks[0].t, blacks[1].t)) calculateWin();
}

function draw() {
    ctx.clearRect(0,0,360,360);
    drawTile(food.x, food.y, food.t.char, true, false);
    for (let i = snake.body.length - 1; i >= 0; i--) {
        const p = snake.history[i * GAP_POINTS];
        if(p) drawTile(p.x, p.y, snake.body[i].t.char, snake.body[i].isRed, i === 0);
    }
}

function drawTile(x, y, char, isRed, isHead) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = isHead ? "#ffb703" : "#fff";
    ctx.beginPath(); ctx.roundRect(-14, -14, 28, 28, 4); ctx.fill();
    ctx.fillStyle = isRed ? "#e63946" : "#1d3557";
    ctx.font = "bold 24px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(char, 0, -3.5); ctx.restore();
}

function updateUI() {
    document.getElementById('b-num').innerText = snake.body.filter(b => !b.isRed).length;
    document.getElementById('s-len').innerText = snake.body.length;
    const area = document.getElementById('reserved-area'); area.innerHTML = '';
    reserved.forEach(s => {
        const d = document.createElement('div'); d.className='set-box';
        s.forEach(t => { const i = document.createElement('div'); i.className='tile'; i.innerText=t.char; d.appendChild(i); });
        area.appendChild(d);
    });
}

function die(msg) { active = false; document.getElementById('m-title').innerText = msg; document.getElementById('modal').style.display = 'block'; }

function calculateWin() {
    active = false;
    let tai = 0, list = [];
    const allSets = reserved;
    const isRedClear = snake.body.length === 2;
    
    // з∞°жШУеП∞жХЄйВПиЉѓ
    list.push("еЇХ (1еП∞)"); tai += 1;
    if(isRedClear) { list.push("зД°зіЕзЙМзНОеЛµ (2еП∞)"); tai += 2; }
    
    const suits = new Set(allSets.flat().map(t => t.suit));
    if(suits.size === 1) { list.push("жЄЕдЄАиЙ≤ (8еП∞)"); tai += 8; }
    
    document.getElementById('tai-list').innerHTML = list.map(l => `<div>вАҐ ${l}</div>`).join('');
    document.getElementById('tai-sum').innerText = `зЄљи®И: ${tai} еП∞`;
    document.getElementById('modal').style.display = 'block';
}

document.getElementById('l-btn').onclick = () => { snake.dirIndex = (snake.dirIndex + 3) % 4; };
document.getElementById('r-btn').onclick = () => { snake.dirIndex = (snake.dirIndex + 1) % 4; };

initSorting();
</script>
</body>
</html>
