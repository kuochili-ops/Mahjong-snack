<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>麻將貪吃蛇 - 視覺優化版</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --board-color: #163e32;
            --tile-white: #ffffff;
            --red-char: #e63946;
            --black-char: #1d3557;
            --gold: #ffb703;
        }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            background-color: var(--bg-color);
            color: #f8f9fa; font-family: "微軟正黑體", "Microsoft JhengHei", sans-serif;
            touch-action: none; overflow: hidden;
        }

        #dashboard {
            width: 360px; display: flex; justify-content: space-between;
            padding: 15px 0; font-size: 16px; font-weight: bold; color: var(--gold);
        }

        canvas {
            background-color: var(--board-color);
            border: 6px solid #4e342e;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #ui-panel {
            width: 360px; margin-top: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-label { font-size: 12px; color: #81b29a; margin-bottom: 8px; text-align: center; }

        #reserved-area {
            display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; min-height: 45px;
        }

        .set-box {
            display: flex; background: #f1faee; padding: 2px;
            border-radius: 4px; border: 1px solid var(--gold);
        }

        .tile {
            width: 24px; height: 32px; 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 20px; 
            margin: 0 1px; border-radius: 2px; background: #fff;
            box-shadow: 1px 1px 0 #ccc;
            line-height: 1;
            /* 增加底部內距，強行將文字推上去 */
            padding-bottom: 4px; 
        }

        .t-red { color: var(--red-char); }
        .t-black { color: var(--black-char); }

        #controls { margin-top: 20px; display: flex; gap: 60px; }

        .btn {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            color: white; font-size: 30px; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; user-select: none;
            transition: transform 0.1s;
        }

        #ccw { background: #457b9d; box-shadow: 0 6px 0 #1d3557; }
        #cw { background: #e63946; box-shadow: 0 6px 0 #a8dadc; }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        #modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 40px; border-radius: 15px;
            text-align: center; display: none; border: 2px solid var(--gold); z-index: 100;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div>剩餘黑字: <span id="b-num">0</span></div>
        <div>蛇身長度: <span id="s-len">0</span></div>
    </div>

    <canvas id="gameCanvas" width="360" height="360"></canvas>

    <div id="ui-panel">
        <div class="section-label">保留區 (已完成牌組)</div>
        <div id="reserved-area"></div>
    </div>

    <div id="controls">
        <div id="ccw" class="btn">↺<span style="font-size:10px">逆時針</span></div>
        <div id="cw" class="btn">↻<span style="font-size:10px">順時針</span></div>
    </div>

    <div id="modal">
        <h1 id="m-title">遊戲結束</h1>
        <button onclick="location.reload()" style="padding: 10px 25px; font-size: 18px; cursor: pointer;">重來一局</button>
    </div>

<script>
/**
 * 麻將模組
 */
const MJ = (() => {
    const chars = ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏','🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡','🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘'];
    const getT = (i) => ({ id: i, char: chars[i], suit: Math.floor(i/9), val: (i%9)+1 });
    return {
        random: () => getT(Math.floor(Math.random()*chars.length)),
        isSet: (a, b, c) => {
            if (a.id === b.id && b.id === c.id) return true;
            if (a.suit === b.suit && b.suit === c.suit) {
                const v = [a.val, b.val, c.val].sort((x,y)=>x-y);
                return (v[1] === v[0]+1 && v[2] === v[1]+1);
            }
            return false;
        },
        extract: (list) => {
            let sets = [], rem = [...list], found = true;
            while(found) {
                found = false;
                for(let i=0; i<rem.length; i++) {
                    for(let j=i+1; j<rem.length; j++) {
                        for(let k=j+1; k<rem.length; k++) {
                            if(MJ.isSet(rem[i], rem[j], rem[k])) {
                                sets.push([rem[i], rem[j], rem[k]]);
                                rem.splice(k,1); rem.splice(j,1); rem.splice(i,1);
                                found = true; break;
                            }
                        }
                        if(found) break;
                    }
                    if(found) break;
                }
            }
            return { sets, rem };
        }
    };
})();

/**
 * 遊戲主體
 */
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
const step = 30, fps = 450;
let snake = [], reserved = [], food = null, dir = 0, active = true;
const vectors = [{x:1,y:0},{x:0,y:1},{x:-1,y:0},{x:0,y:-1}];

function start() {
    let initial = [];
    for(let i=0; i<12; i++) initial.push(MJ.random());
    const processed = MJ.extract(initial);
    reserved = processed.sets;
    processed.rem.forEach((t, i) => {
        snake.push({ x: 5-i, y: 5, t, isRed: false });
    });
    genFood();
    updateUI();
    run();
}

function genFood() {
    let valid = false;
    while(!valid) {
        food = { x: Math.floor(Math.random()*12), y: Math.floor(Math.random()*12), t: MJ.random() };
        valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
}

function run() {
    if(!active) return;
    const next = { x: snake[0].x + vectors[dir].x, y: snake[0].y + vectors[dir].y };

    if(next.x < 0 || next.x >= 12 || next.y < 0 || next.y >= 12) return die("放槍！撞到邊界");
    for(let i=0; i<snake.length - 1; i++) {
        if(next.x === snake[i].x && next.y === snake[i].y) return die("放槍！撞到自己了");
    }

    if(next.x === food.x && next.y === food.y) {
        handleEat(next, food.t);
        genFood();
    } else {
        for(let i=snake.length-1; i>0; i--) {
            snake[i].x = snake[i-1].x; snake[i].y = snake[i-1].y;
        }
        snake[0].x = next.x; snake[0].y = next.y;
    }

    draw();
    setTimeout(run, fps);
}

function handleEat(headPos, newT) {
    const blacks = snake.filter(s => !s.isRed);
    const reds = snake.filter(s => s.isRed);
    let matchedSet = null;
    let partsToRemove = [];

    for(let i=0; i<blacks.length && !matchedSet; i++) {
        for(let j=i+1; j<blacks.length && !matchedSet; j++) {
            if(MJ.isSet(newT, blacks[i].t, blacks[j].t)) {
                matchedSet = [newT, blacks[i].t, blacks[j].t];
                partsToRemove = [blacks[i], blacks[j]];
            }
        }
    }
    if(!matchedSet) {
        for(let i=0; i<reds.length && !matchedSet; i++) {
            for(let j=i+1; j<reds.length && !matchedSet; j++) {
                if(MJ.isSet(newT, reds[i].t, reds[j].t)) {
                    matchedSet = [newT, reds[i].t, reds[j].t];
                    partsToRemove = [reds[i], reds[j]];
                }
            }
        }
    }

    if(matchedSet) {
        reserved.push(matchedSet);
        const remaining = snake.filter(s => !partsToRemove.includes(s));
        let oldPositions = snake.map(s => ({x: s.x, y: s.y}));
        oldPositions.unshift(headPos);

        snake = remaining;
        snake.forEach((part, index) => {
            part.x = oldPositions[index].x;
            part.y = oldPositions[index].y;
        });
        if(snake.length > 0) {
            snake[0].x = headPos.x;
            snake[0].y = headPos.y;
        }
    } else {
        const oldPos = snake.map(s => ({x: s.x, y: s.y}));
        snake.unshift({ x: headPos.x, y: headPos.y, t: newT, isRed: true });
        for(let i=1; i<snake.length; i++) {
            snake[i].x = oldPos[i-1].x;
            snake[i].y = oldPos[i-1].y;
        }
    }

    updateUI();
    if(snake.filter(s => !s.isRed).length === 0) win();
}

function draw() {
    ctx.clearRect(0,0,360,360);
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    for(let i=0; i<=360; i+=step) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,360); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(360,i); ctx.stroke();
    }
    drawT(food.x*step, food.y*step, food.t.char, true, false);
    snake.forEach((s, i) => drawT(s.x*step, s.y*step, s.t.char, s.isRed, i===0));
}

function drawT(x,y,c,r,h) {
    ctx.fillStyle = h ? "#ffb703" : "#fff";
    ctx.beginPath(); ctx.roundRect(x+2,y+2,step-4,step-4,4); ctx.fill();
    ctx.fillStyle = r ? "#e63946" : "#1d3557";
    
    ctx.font = "bold 24px Arial"; 
    ctx.textAlign = "center"; 
    ctx.textBaseline = "middle";
    
    // 再次上移：Y 座標改為 y+step/2 - 2 (或更精確的值)
    ctx.fillText(c, x+step/2, y+step/2 - 2.5); 
}

function updateUI() {
    document.getElementById('b-num').innerText = snake.filter(s => !s.isRed).length;
    document.getElementById('s-len').innerText = snake.length;
    const area = document.getElementById('reserved-area');
    area.innerHTML = '';
    reserved.forEach(s => {
        const d = document.createElement('div'); d.className='set-box';
        s.forEach(t => {
            const i = document.createElement('div'); i.className='tile t-black'; i.innerText=t.char;
            d.appendChild(i);
        });
        area.appendChild(d);
    });
}

function die(t) { active = false; showM(t); }
function win() { active = false; showM("🎉 胡牌！恭喜！ 🎉"); }
function showM(t) { document.getElementById('m-title').innerText=t; document.getElementById('modal').style.display='block'; }

document.getElementById('cw').onclick = () => { dir = (dir+1)%4; draw(); };
document.getElementById('ccw').onclick = () => { dir = (dir+3)%4; draw(); };

start();
</script>
</body>
</html>
